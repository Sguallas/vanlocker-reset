<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vanlocker</title>
</head>
<body>
  <p>Redirigiendo a la app...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const pago = params.get("pago");
    
    if (token) {
      window.location.href = "vanlocker://reset-password?token=" + token;
    } else if (pago === "exitoso") {
  const reservaId = params.get("reserva_id") || "";
  window.location.href = "vanlocker://pago-completado?reserva_id=" + reservaId;
} else if (pago === "cancelado") {
      window.location.href = "vanlocker://pago-cancelado";
    } else {
      document.body.innerHTML = "<p>Enlace no válido.</p>";
    }
  </script>
</body>
</html>
